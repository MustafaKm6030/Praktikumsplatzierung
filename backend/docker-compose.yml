services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: praktikumsamt_db
    environment:
      POSTGRES_DB: praktikumsamt
      POSTGRES_USER: praktikumsamt_user
      POSTGRES_PASSWORD: praktikumsamt_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # For database dumps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praktikumsamt_user -d praktikumsamt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: