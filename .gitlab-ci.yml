stages:
  - build
  - unit_test
  - integration_test
  - report
  - deploy

variables:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend

# BUILD STAGE
build_backend:
  stage: build
  image: python:3.11
  script:
    - cd $BACKEND_DIR
    - pip install --break-system-packages -r requirements.txt
    - python manage.py check
  artifacts:
    paths:
      - $BACKEND_DIR/
    expire_in: 1 hour

build_frontend:
  stage: build
  image: node:18
  script:
    - cd $FRONTEND_DIR
    - npm install
    - npm run build
  artifacts:
    paths:
      - $FRONTEND_DIR/
    expire_in: 1 hour


# UNIT TEST STAGE
unit_test_backend:
  stage: unit_test
  image: python:3.11
  dependencies:
    - build_backend
  services:
    - postgres:14
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    POSTGRES_HOST: postgres
    DATABASE_URL: postgresql://test_user:test_password@postgres:5432/test_db
  script:
    - cd $BACKEND_DIR
    - pip install --break-system-packages -r requirements.txt coverage
    - coverage run manage.py test
    - coverage report
    - coverage xml -o coverage.xml
  after_script:
    - cd $BACKEND_DIR
    - coverage xml -o coverage.xml 2>/dev/null || echo "Coverage file generation skipped (tests may have failed early)"
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $BACKEND_DIR/coverage.xml
    paths:
      - $BACKEND_DIR/coverage.xml
    expire_in: 1 week


unit_test_frontend:
  stage: unit_test
  image: node:18
  dependencies:
    - build_frontend
  script:
    - cd $FRONTEND_DIR
    - npm install
    - npm test -- --coverage --watchAll=false --coverageReporters="cobertura"
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $FRONTEND_DIR/coverage/cobertura-coverage.xml
    paths:
      - $FRONTEND_DIR/coverage/
    expire_in: 1 week


# INTEGRATION TEST STAGE
integration_test_backend:
  stage: integration_test
  image: python:3.11
  dependencies:
    - build_backend
  services:
    - postgres:14
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    POSTGRES_HOST: postgres
    DATABASE_URL: postgresql://test_user:test_password@postgres:5432/test_db
  script:
    - cd $BACKEND_DIR
    - pip install --break-system-packages -r requirements.txt psycopg2-binary
    - python manage.py test

integration_test_frontend:
  stage: integration_test
  image: node:18
  dependencies:
    - build_frontend
  script:
    - cd $FRONTEND_DIR
    - npm install
    - npm test -- --watchAll=false
  allow_failure: true

# REPORT STAGE
upload_coverage:
  stage: report
  image: curlimages/curl:latest
  # Run this even if tests fail (so we can see what WAS covered before the failure)
  when: always
  dependencies:
    - unit_test_backend
    - unit_test_frontend
  script:
    # Upload Backend Coverage
    - |
      echo "Uploading Backend Coverage..."
      if [ -f backend/coverage.xml ]; then
        curl -X POST "$TEAMSCALE_URL/api/projects/$TEAMSCALE_PROJECT/external-analysis/session/auto-create/report?format=COBERTURA&partition=Unit%20Tests&message=Backend+Coverage" \
        --user "$TEAMSCALE_USER:$TEAMSCALE_ACCESS_TOKEN" \
        --header "Content-Type: multipart/form-data" \
        --form "report=@backend/coverage.xml"
        echo "Backend coverage uploaded successfully"
      else
        echo "WARNING: backend/coverage.xml not found, skipping backend coverage upload"
      fi

    # Upload Frontend Coverage
    - |
      echo "Uploading Frontend Coverage..."
      if [ -f frontend/coverage/cobertura-coverage.xml ]; then
        curl -X POST "$TEAMSCALE_URL/api/projects/$TEAMSCALE_PROJECT/external-analysis/session/auto-create/report?format=COBERTURA&partition=Unit%20Tests&message=Frontend+Coverage" \
        --user "$TEAMSCALE_USER:$TEAMSCALE_ACCESS_TOKEN" \
        --header "Content-Type: multipart/form-data" \
        --form "report=@frontend/coverage/cobertura-coverage.xml"
        echo "Frontend coverage uploaded successfully"
      else
        echo "WARNING: frontend/coverage/cobertura-coverage.xml not found, skipping frontend coverage upload"
      fi

# DEPLOYMENT STAGE
deploy_backend:
  stage: deploy
  image: alpine:latest
  only:
    - main
    - master
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H malik08.stud.fim.uni-passau.de >> ~/.ssh/known_hosts
  script:
    - rsync -avz --delete --exclude='venv' --exclude='*.pyc' --exclude='__pycache__' --exclude='db.sqlite3' --exclude='.env' backend/ malik@malik08.stud.fim.uni-passau.de:/var/www/praktikumsamt/backend/
    - |
      ssh malik@malik08.stud.fim.uni-passau.de 'cd /var/www/praktikumsamt/backend && source venv/bin/activate && pip install --upgrade pip && pip install asgiref==3.10.0 Django==4.2.25 django-cors-headers==4.9.0 djangorestframework==3.16.1 sqlparse==0.5.3 typing_extensions==4.15.0 django-filter==24.3 python-decouple==3.8 dj-database-url==2.1.0 && pip install "psycopg[binary]" gunicorn && python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear && sudo systemctl restart gunicorn && echo "Backend deployment completed!"'
  environment:
    name: production
    url: http://malik08.stud.fim.uni-passau.de

deploy_frontend:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build_frontend
  only:
    - main
    - master
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H malik08.stud.fim.uni-passau.de >> ~/.ssh/known_hosts
  script:
    - rsync -avz --delete frontend/build/ malik@malik08.stud.fim.uni-passau.de:/var/www/praktikumsamt/frontend/build/
    - ssh malik@malik08.stud.fim.uni-passau.de 'sudo systemctl reload nginx && echo "Frontend deployment completed!"'
  environment:
    name: production
    url: http://malik08.stud.fim.uni-passau.de